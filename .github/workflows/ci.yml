name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-java-client:
    name: Build Java Client
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build client
        run: cd client-java && mvn clean install -DskipTests

      - name: Build examples
        run: cd examples/calculator-tests && mvn clean compile

  build-mcp-server:
    name: Build MCP Server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: mcp/package.json

      - name: Install dependencies
        run: cd mcp && npm install

      - name: Build
        run: cd mcp && npm run build
